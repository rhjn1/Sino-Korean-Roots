<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한자 뿌리 | Hanja Roots</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden}
body{position:fixed;width:100%;height:100%;overflow:hidden;background:#0f172a;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;user-select:none;-webkit-tap-highlight-color:transparent}

/* App Shell */
.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* Header */
.hdr{display:flex;align-items:center;padding:.6rem .9rem;flex-shrink:0;border-bottom:1px solid #1e293b;gap:.5rem}
.hdr-center{flex:1;text-align:center}
.hdr-center h1{font-size:1.05rem;font-weight:700;color:#34d399;letter-spacing:.02em}
.hdr-center p{font-size:.6rem;color:#475569;margin-top:1px;letter-spacing:.03em}
.hdr-side{width:2.25rem;flex-shrink:0}
.icon-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;width:2.25rem;height:2.25rem;border-radius:.5rem;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-appearance:none}
.icon-btn:active{background:#334155}

/* Main / Views */
.main{flex:1;overflow:hidden;position:relative;min-height:0}
.view{position:absolute;inset:0;display:none;flex-direction:column;align-items:stretch}
.view.active{display:flex}

/* CARDS VIEW */
#view-cards{padding:.4rem .9rem .6rem;align-items:center;justify-content:space-between}
.deck-info{font-size:.65rem;color:#475569;text-align:center;flex-shrink:0;padding:.1rem 0}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:22rem;min-height:0}
.perspective{width:100%;aspect-ratio:3/4;max-height:100%;perspective:1000px;cursor:pointer;touch-action:none;position:relative}
#flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,0,.2,1);border-radius:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#flashcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:1.5rem;display:flex;flex-direction:column;justify-content:space-between;padding:1.25rem}
.face-front{background:#1e293b;border:2px solid #334155;text-align:center;align-items:center}
.face-back{background:#022c22;border:2px solid #10b981;transform:rotateY(180deg)}
.progress{font-size:.65rem;font-weight:600;letter-spacing:.05em;color:#475569;text-align:center;padding:0 2.4rem}
.progress.bk{color:rgba(52,211,153,.5);text-align:center;padding:0 2.4rem}
.front-body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:.9rem;width:100%}
.grp-badge{font-size:.55rem;color:#64748b;letter-spacing:.08em;text-transform:uppercase;background:#0f172a;padding:.15rem .6rem;border-radius:999px;border:1px solid #1e293b;max-width:90%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#affix-ko{font-size:2.6rem;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.1}
#examples-ko{font-size:1rem;color:#f1f5f9;font-weight:500;line-height:1.85}
#examples-ko b{color:#34d399;font-weight:700}
.hint{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;flex-shrink:0}
.hint.bk{color:rgba(16,185,129,.4);text-align:center}
.back-body{flex:1;display:flex;flex-direction:column;gap:.65rem;overflow:hidden;min-height:0}
.back-title{border-bottom:1px solid #065f46;padding-bottom:.5rem;flex-shrink:0}
#affix-en{font-size:1.35rem;font-weight:700;color:#fff}
#affix-ko-back{font-size:.8rem;color:#34d399;margin-top:.1rem}
#examples-en{font-size:.7rem;color:#d1fae5;background:rgba(15,23,42,.45);padding:.6rem;border-radius:.65rem;border:1px solid rgba(6,78,59,.5);overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;touch-action:pan-y;display:flex;flex-direction:column;gap:.55rem}
.bd-line{display:flex;align-items:center;flex-wrap:wrap;gap:.35rem;background:rgba(2,44,34,.45);border:1px solid rgba(6,95,70,.35);border-radius:.6rem;padding:.5rem}
.bd-word{font-size:.95rem;font-weight:700;color:#fff;margin-right:.15rem}
.bd-plus{color:#475569;font-weight:700;font-size:.8rem}
.bd-arrow{color:#475569;font-weight:700;font-size:.95rem;padding:0 .1rem}
.bd-result{font-size:.78rem;color:#a7f3d0;font-weight:600}
.tile{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.3rem .45rem;border-radius:.5rem;background:rgba(2,44,34,.8);border:1px solid #1e293b;line-height:1.2}
.tile .t-head{font-size:.82rem;font-weight:700;color:#cbd5e1;white-space:nowrap}
.tile .t-gl{font-size:.55rem;color:#94a3b8;margin-top:.1rem;text-align:center;white-space:nowrap}
.tile.tap{background:rgba(16,185,129,.12);border-color:#10b981;cursor:pointer}
.tile.tap .t-head{color:#34d399}
.tile.tap .t-head::after{content:" ›";color:#10b981}
.tile.tap .t-gl{color:#6ee7b7}
.tile.tap:active{background:rgba(16,185,129,.25)}
.tile.peek{background:rgba(234,179,8,.12);border-color:#eab308;cursor:pointer}
.tile.peek .t-head{color:#fbbf24}
.tile.peek .t-head::after{content:" ›";color:#eab308}
.tile.peek .t-gl{color:#fde68a}
.tile.peek:active{background:rgba(234,179,8,.25)}
.sent{flex-basis:100%;width:100%;margin-top:.45rem;padding-top:.45rem;border-top:1px dashed rgba(6,95,70,.45);display:flex;flex-direction:column;gap:.12rem}
.sent-ko{font-size:.72rem;color:#e2e8f0;line-height:1.5}
.sent-ko b{color:#6ee7b7;font-weight:700}
.sent-en{font-size:.62rem;color:#94a3b8;line-height:1.4}
.info-btn{position:absolute;top:2.7rem;right:.85rem;width:1.5rem;height:1.5rem;border-radius:50%;background:rgba(52,211,153,.15);border:1px solid #10b981;color:#34d399;font-size:.85rem;font-weight:700;font-style:italic;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;font-family:Georgia,serif}
.info-btn:active{background:rgba(52,211,153,.3)}
.star-btn{position:absolute;top:.55rem;left:.7rem;width:1.9rem;height:1.9rem;border-radius:50%;background:transparent;border:none;color:#475569;font-size:1.4rem;line-height:1;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;padding:0;-webkit-appearance:none}
.star-btn.on{color:#fbbf24}
.star-btn:active{transform:scale(.85)}
.note-overlay{position:absolute;inset:0;background:rgba(2,12,9,.97);border-radius:1.5rem;z-index:10;display:none;flex-direction:column;padding:1.1rem;border:2px solid #10b981}
.note-overlay.show{display:flex}
.note-hdr{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #065f46;padding-bottom:.5rem;margin-bottom:.6rem;flex-shrink:0}
.note-hdr-title{font-size:.95rem;font-weight:700;color:#fff}
.note-close{width:1.6rem;height:1.6rem;border-radius:50%;background:#1e293b;border:1px solid #334155;color:#94a3b8;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.note-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.note-section{margin-bottom:.9rem}
.note-label{font-size:.55rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.45rem;padding-bottom:.2rem;border-bottom:1px solid #1e293b}
.note-label.sino{color:#fbbf24}
.note-label.nat{color:#60a5fa}
.note-entry{margin-bottom:.55rem;padding:.1rem 0 .1rem .6rem;border-left:2px solid #1e293b}
.note-entry .ne-head{font-size:.82rem;font-weight:700;color:#cbd5e1}
.note-entry .ne-gloss{font-size:.75rem;color:#94a3b8}
.note-entry .ne-ex{font-size:.72rem;color:#64748b;margin-top:.1rem;line-height:1.5}
.note-entry.tappable{border-left-color:#10b981;cursor:pointer}
.note-entry.tappable .ne-head{color:#34d399}
.note-entry.tappable .ne-ex{color:#6ee7b7}
.note-entry.tappable:active{background:rgba(16,185,129,.12)}
.note-entry.tappable .ne-head::after{content:" ›";color:#10b981;font-weight:700}
.note-entry.peekable{border-left-color:#eab308;cursor:pointer}
.note-entry.peekable .ne-head{color:#fbbf24}
.note-entry.peekable .ne-head::after{content:" ›";color:#eab308;font-weight:700}
.note-entry.peekable:active{background:rgba(234,179,8,.12)}
.card-nav{display:flex;justify-content:space-between;width:100%;max-width:22rem;padding-top:.4rem;flex-shrink:0;gap:.75rem}
.card-nav button{flex:1;border:none;cursor:pointer;color:#fff;padding:.6rem 0;border-radius:.75rem;font-weight:700;font-size:.9rem;transition:transform .12s,opacity .15s;-webkit-appearance:none}
.card-nav button:active{transform:scale(.95)}
#prevBtn{background:#1e293b;border:1px solid #334155;color:#94a3b8}
#nextBtn{background:#059669}

/* TABLE VIEW */
#view-table{touch-action:pan-y}
.tbl-filter{padding:.55rem .9rem;background:#0f172a;border-bottom:1px solid #1e293b;flex-shrink:0}
.tbl-filter input{width:100%;background:#1e293b;border:1px solid #334155;color:#f1f5f9;padding:.4rem .7rem;border-radius:.6rem;font-size:.85rem;outline:none;-webkit-appearance:none}
.tbl-filter input::placeholder{color:#475569}
.tbl-scroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.grp-hdr{background:#0a1120;padding:.35rem .9rem;font-size:.6rem;font-weight:700;color:#34d399;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid #1e293b;border-top:1px solid #1e293b;position:sticky;top:0;z-index:2}
.tbl-row{display:flex;align-items:center;padding:.55rem .9rem;border-bottom:1px solid #1e293b;gap:.5rem;cursor:pointer;transition:background .1s;min-height:2.8rem}
.tbl-row:active{background:#1e293b}
.tbl-root{font-size:.9rem;font-weight:700;color:#fff;flex-shrink:0;width:3rem}
.tbl-hanja{font-size:.75rem;color:#64748b;flex-shrink:0;width:2.5rem}
.tbl-gloss{font-size:.8rem;color:#6ee7b7;flex:1}
.tbl-arrow{font-size:.85rem;color:#334155;flex-shrink:0}
.empty-msg{text-align:center;padding:3rem 1rem;color:#475569;font-size:.85rem;line-height:1.8}

/* OVERLAY / MENU */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:flex-end;touch-action:none}
.overlay.open{display:flex}
.sheet{background:#0f172a;border-top:1px solid #1e293b;border-radius:1.25rem 1.25rem 0 0;width:100%;max-height:82vh;display:flex;flex-direction:column;padding:.75rem .9rem .9rem}
.sheet-handle{width:2.25rem;height:.22rem;background:#334155;border-radius:999px;margin:0 auto .65rem}
.sheet-title{font-size:.72rem;font-weight:700;color:#64748b;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:.65rem}
.all-btns{display:flex;gap:.5rem;margin-bottom:.65rem}
.all-btns button{flex:1;padding:.4rem;border-radius:.55rem;font-size:.75rem;font-weight:700;border:1px solid #334155;cursor:pointer;background:#1e293b;color:#94a3b8;transition:background .15s;-webkit-appearance:none}
.all-btns button:active{background:#334155}
.grp-list{overflow-y:scroll;-webkit-overflow-scrolling:touch;flex:1;touch-action:pan-y}
.grp-item{display:flex;align-items:center;justify-content:space-between;padding:.65rem .2rem;border-bottom:1px solid #1e293b}
.grp-item:last-child{border-bottom:none}
.grp-item-name{font-size:.82rem;font-weight:600;color:#f1f5f9}
.star-row{background:rgba(251,191,36,.07);margin:0 -.2rem;padding-left:.2rem;padding-right:.2rem;border-radius:.5rem;border-bottom:1px solid rgba(251,191,36,.2)!important}
.star-row .grp-item-name{color:#fbbf24}
.grp-item-count{font-size:.62rem;color:#475569;margin-top:.1rem}
.tog{position:relative;width:2.6rem;height:1.5rem;flex-shrink:0}
.tog input{position:absolute;opacity:0;width:0;height:0}
.tog-track{position:absolute;inset:0;background:#1e293b;border:1.5px solid #334155;border-radius:999px;cursor:pointer;transition:background .2s,border-color .2s}
.tog input:checked~.tog-track{background:#059669;border-color:#059669}
.tog-thumb{position:absolute;top:50%;left:.2rem;width:1.1rem;height:1.1rem;background:#fff;border-radius:50%;transform:translateY(-50%);transition:left .2s;pointer-events:none}
.tog input:checked~.tog-thumb{left:calc(100% - 1.3rem)}
.done-btn{margin-top:.65rem;width:100%;padding:.6rem;background:#059669;color:#fff;border:none;border-radius:.75rem;font-weight:700;font-size:.95rem;cursor:pointer;-webkit-appearance:none}
.done-btn:active{opacity:.85}
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <div class="hdr-side"></div>
    <div class="hdr-center">
      <h1>한자 뿌리 | Hanja Roots</h1>
      <p id="hdr-sub">Tap to flip · Swipe or use buttons</p>
    </div>
    <div class="hdr-side" style="display:flex;gap:.4rem;justify-content:flex-end">
      <button class="icon-btn" id="table-btn" onclick="showTable()" title="Table view">📋</button>
      <button class="icon-btn" id="menu-btn" onclick="openMenu()">☰</button>
    </div>
  </header>

  <main class="main">

    <!-- CARDS -->
    <div class="view active" id="view-cards">
      <div class="deck-info" id="deck-info">—</div>
      <div class="card-area">
        <div class="perspective" onclick="flipCard()">
          <div id="flashcard">
            <div class="face face-front">
              <button class="star-btn" id="star-btn" onclick="toggleStar(event)">☆</button>
              <div class="progress" id="prog-front">Card 1</div>
              <div class="front-body">
                <div class="grp-badge" id="grp-badge">—</div>
                <div id="affix-ko"></div>
                <div id="examples-ko"></div>
              </div>
              <div class="hint">Tap to flip</div>
            </div>
            <div class="face face-back">
              <button class="info-btn" id="info-btn" onclick="openNote(event)" style="display:none">i</button>
              <div class="progress bk" id="prog-back">Card 1</div>
              <div class="back-body">
                <div class="back-title">
                  <div id="affix-en"></div>
                  <div id="affix-ko-back"></div>
                </div>
                <div id="examples-en"></div>
              </div>
              <div class="hint bk">Tap to flip back</div>
            </div>
          </div>
          <div class="note-overlay" id="note-overlay">
            <div class="note-hdr">
              <div class="note-hdr-title" id="note-title">Confusion points</div>
              <button class="note-close" onclick="closeNote(event)">✕</button>
            </div>
            <div class="note-body" id="note-body"></div>
          </div>
        </div>
      </div>
      <div class="card-nav">
        <button id="prevBtn" onclick="prevCard(event)">← Prev</button>
        <button id="nextBtn" onclick="nextCard(event)">Next →</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="view" id="view-table">
      <div class="tbl-filter" style="display:flex;gap:.5rem;align-items:center">
        <button class="icon-btn" onclick="showCards()" style="flex-shrink:0">←</button>
        <input type="text" id="tbl-input" placeholder="Filter by root or meaning…" oninput="renderTable()" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <div class="tbl-scroll" id="tbl-scroll"></div>
    </div>

  </main>

</div>

<!-- Group Menu -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Active Groups</div>
    <div class="all-btns">
      <button onclick="setAll(true)">All On</button>
      <button onclick="setAll(false)">All Off</button>
    </div>
    <div class="grp-list" id="grp-list"></div>
    <button class="done-btn" onclick="closeMenu()">Done</button>
  </div>
</div>

<script>
const GROUPS = [
  { id:1, name:"Movement, Direction & Space" },
  { id:2, name:"Time, Nature & Elements" },
  { id:3, name:"People, Family & Roles" },
  { id:4, name:"Mind, Senses & Communication" },
  { id:5, name:"Places, Buildings & Objects" },
  { id:6, name:"Action, Work, Law & Production" },
  { id:7, name:"Quantity, Degree, Economy & Status" },
];

const CARDS = [
  // ── GROUP 1 ──────────────────────────────────────────────────────────────
  { group:1, root:"동 (動)", gloss:"To Move",
    examples:["운동","자동차","동물"],
    breakdown:[
      "<b>운동</b>: Wield (운) + Move (동) → Exercise / Workout",
      "<b>자동차</b>: Self (자) + Move (동) + Vehicle (차) → Car / Automobile",
      "<b>동물</b>: Move (동) + Physical Thing (물) → Animal"
    ]
  },
  { group:1, root:"출 (出)", gloss:"Out / Emerge",
    examples:["출발","출구","수출"],
    breakdown:[
      "<b>출발</b>: Go out (출) + Launch (발) → Departure",
      "<b>출구</b>: Go out (출) + Gate/Mouth (구) → Exit",
      "<b>수출</b>: Transport (수) + Go out (출) → Export"
    ]
  },
  { group:1, root:"입 (入)", gloss:"Enter / Go In",
    examples:["입구","수입","입장"],
    breakdown:[
      "<b>입구</b>: Enter (입) + Gate/Mouth (구) → Entrance",
      "<b>수입</b>: Gather/Receive (수) + Enter (입) → Import / Income",
      "<b>입장</b>: Enter (입) + Place/Yard (장) → Admission / Entrance"
    ]
  },
  { group:1, root:"행 (行)", gloss:"Go / Act",
    examples:["행동","여행","비행기"],
    breakdown:[
      "<b>행동</b>: Go/Act (행) + Move (동) → Action / Behavior",
      "<b>여행</b>: Travel (여) + Go/Act (행) → Travel / Trip",
      "<b>비행기</b>: Fly (비) + Go/Act (행) + Machine (기) → Airplane"
    ]
  },
  { group:1, root:"상 (上)", gloss:"Up / Above",
    examples:["상반기","이상","상하"],
    breakdown:[
      "<b>상반기</b>: Up/First (상) + Half (반) + Period (기) → First half of the year",
      "<b>이상</b>: By means of (이) + Above (상) → Above / More than",
      "<b>상하</b>: Up (상) + Down (하) → Vertical / High and low"
    ]
  },
  { group:1, root:"하 (下)", gloss:"Down / Below",
    examples:["지하","이하","낙하"],
    breakdown:[
      "<b>지하</b>: Earth/Ground (지) + Below (하) → Underground / Subway level",
      "<b>이하</b>: By means of (이) + Below (하) → Below / Less than",
      "<b>낙하</b>: Drop (낙) + Down (하) → Fall / Descent"
    ]
  },
  { group:1, root:"내 (內)", gloss:"Inside",
    examples:["내부","국내","실내"],
    breakdown:[
      "<b>내부</b>: Inside (내) + Part/Section (부) → Interior / Inside",
      "<b>국내</b>: Country (국) + Inside (내) → Domestic",
      "<b>실내</b>: Room (실) + Inside (내) → Indoors"
    ]
  },
  { group:1, root:"외 (外)", gloss:"Outside",
    examples:["외부","외국","실외"],
    breakdown:[
      "<b>외부</b>: Outside (외) + Part/Section (부) → Exterior / Outside",
      "<b>외국</b>: Outside (외) + Country (국) → Foreign country",
      "<b>실외</b>: Room (실) + Outside (외) → Outdoors"
    ]
  },
  { group:1, root:"전 (前)", gloss:"Before / Front",
    examples:["오전","전반","직전"],
    breakdown:[
      "<b>오전</b>: Noon (오) + Before (전) → A.M. / Morning",
      "<b>전반</b>: Front/First (전) + Half (반) → First half (of a game/event)",
      "<b>직전</b>: Straight/Direct (직) + Before (전) → Right before"
    ]
  },
  { group:1, root:"후 (後)", gloss:"After / Back",
    examples:["오후","후반","직후"],
    breakdown:[
      "<b>오후</b>: Noon (오) + After (후) → P.M. / Afternoon",
      "<b>후반</b>: Back/Second (후) + Half (반) → Second half (of a game/event)",
      "<b>직후</b>: Straight/Direct (직) + After (후) → Right after"
    ]
  },
  { group:1, root:"좌 (左)", gloss:"Left",
    examples:["좌회전","좌측","좌석"],
    breakdown:[
      "<b>좌회전</b>: Left (좌) + Turn (회) + Roll (전) → Left turn",
      "<b>좌측</b>: Left (좌) + Side (측) → Left side",
      "<b>좌석</b>: Left (좌) + Seat (석) → Seat"
    ]
  },
  { group:1, root:"우 (右)", gloss:"Right",

// ── STATE ─────────────────────────────────────────────────────────────────
let activeGroups = new Set(GROUPS.map(g => g.id));
let isFlipped    = false;
let history      = [];
let pointer      = -1;
let cardIdx      = 0;
let peekCard     = null;   // when set, a one-off card from a disabled group (not in rotation)

// ── STARRED CARDS (persisted) ─────────────────────────────────────────────
// Stable id per card = "group|root" (root alone isn't unique: 금(金) appears twice).
const STAR_GROUP = 0;  // virtual group id for the Starred set
function cardId(c) { return c.group + '|' + c.root; }

let starred = new Set();
try {
  const saved = localStorage.getItem('hanja_starred');
  if (saved) starred = new Set(JSON.parse(saved));
} catch (e) {}

function saveStarred() {
  try { localStorage.setItem('hanja_starred', JSON.stringify([...starred])); } catch (e) {}
}

function isStarred(c) { return c && starred.has(cardId(c)); }

function toggleStar(e) {
  if (e) e.stopPropagation();
  const c = currentCard();
  if (!c) return;
  const id = cardId(c);
  if (starred.has(id)) starred.delete(id); else starred.add(id);
  saveStarred();
  updateStarBtn();
  // if viewing the Starred group and we just un-starred, the deck shrank — re-render handles it
  if (activeGroups.has(STAR_GROUP) && activeGroups.size === 1) {
    // keep showing this card (peek-like) even if removed, until Next
  }
}

function updateStarBtn() {
  const c = currentCard();
  const btn = document.getElementById('star-btn');
  if (!c) { btn.style.display = 'none'; return; }
  btn.style.display = 'flex';
  const on = isStarred(c);
  btn.classList.toggle('on', on);
  btn.innerText = on ? '★' : '☆';
}

// The card currently shown: a peeked card if active, else the rotation card.
function currentCard() {
  if (peekCard) return peekCard;
  const deck = getActiveDeck();
  return deck.length ? deck[cardIdx] : null;
}

function getActiveDeck() {
  return CARDS.filter(c => activeGroups.has(c.group) || (activeGroups.has(STAR_GROUP) && isStarred(c)));
}

// Produce a single-quoted JS string literal safe to embed inside a double-quoted
// HTML attribute (onclick="..."). Escapes backslashes and single quotes.
function jsArg(s) {
  return "'" + String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
}

// ── BREAKDOWN TILE RENDERER ─────────────────────────────────────────────
// Render one breakdown line as: word text + syllable tiles + result text.
// A tile is tappable when PIECEMAP has a verified deck-root hanja for that piece.
function renderBreakdownTiles(line) {
  // Split "<b>WORD</b>: PIECES → RESULT"
  const wm = line.match(/^<b>([^<]+)<\/b>:?\s*/);
  const word = wm ? wm[1] : '';
  let rest = wm ? line.slice(wm[0].length) : line;
  const arrowI = rest.indexOf('→');
  const head = arrowI >= 0 ? rest.slice(0, arrowI) : rest;
  const result = arrowI >= 0 ? rest.slice(arrowI + 1).trim() : '';

  // Each piece is "Gloss (음)" joined by + (sometimes with extra bracket notes).
  // We extract gloss + syllable pairs; non-piece text (like [compound notes]) is dropped from tiles.
  const pieces = [];
  const re = /([A-Za-z][A-Za-z0-9/ .\-]*?)\s*\(([가-힣])\)/g;
  let m;
  while ((m = re.exec(head)) !== null) {
    pieces.push({ gloss: m[1].trim(), syl: m[2] });
  }

  let html = '<div class="bd-line">';
  if (word) html += `<span class="bd-word">${word}</span>`;
  pieces.forEach((p, i) => {
    if (i > 0) html += '<span class="bd-plus">+</span>';
    const key = `${word}|${p.syl}`;
    const hit = PIECEMAP[key];
    if (hit) {
      const [hanja, rootStr] = hit;
      const card = CARDS.find(c => c.root === rootStr);
      const head2 = `${p.syl} (${hanja})`;
      const gl = p.gloss.toLowerCase();
      const active = card && activeGroups.has(card.group);
      if (active) {
        html += `<span class="tile tap" onclick="jumpToCardRoot(event,${jsArg(rootStr)})">`
              + `<span class="t-head">${head2}</span><span class="t-gl">${gl}</span></span>`;
      } else if (card) {
        // target exists but its group is disabled → yellow one-off preview
        html += `<span class="tile peek" onclick="peekCardRoot(event,${jsArg(rootStr)})">`
              + `<span class="t-head">${head2}</span><span class="t-gl">${gl}</span></span>`;
      } else {
        html += `<span class="tile"><span class="t-head">${head2}</span><span class="t-gl">${gl}</span></span>`;
      }
    } else {
      html += `<span class="tile"><span class="t-head">${p.syl}</span><span class="t-gl">${p.gloss.toLowerCase()}</span></span>`;
    }
  });
  if (result) html += `<span class="bd-arrow">→</span><span class="bd-result">${result}</span>`;
  const sent = SENT[word];
  if (sent) {
    html += `<div class="sent"><div class="sent-ko">${boldWord(sent[0], word)}</div>`
          + `<div class="sent-en">${sent[1]}</div></div>`;
  }
  html += '</div>';
  return html;
}

// Bold the target word within the Korean sentence (handles attached particles).
function boldWord(sentence, word) {
  const i = sentence.indexOf(word);
  if (i < 0) return sentence;
  return sentence.slice(0, i) + '<b>' + word + '</b>' + sentence.slice(i + word.length);
}

// ── CARD LOGIC ────────────────────────────────────────────────────────────
const $card = document.getElementById('flashcard');

function randIdx(deck, exclude) {
  if (deck.length <= 1) return 0;
  let i;
  do { i = Math.floor(Math.random() * deck.length); } while (i === exclude);
  return i;
}

function renderCard() {
  const deck = getActiveDeck();
  const d = currentCard();
  if (!d) {
    document.getElementById('affix-ko').innerText = '—';
    document.getElementById('examples-ko').innerHTML = '';
    document.getElementById('affix-en').innerText = 'No groups active';
    document.getElementById('affix-ko-back').innerText = '';
    document.getElementById('examples-en').innerHTML = '<div style="color:#475569;font-size:.75rem">Enable at least one group in ☰</div>';
    document.getElementById('grp-badge').innerText = '—';
    document.getElementById('prog-front').innerText = '—';
    document.getElementById('prog-back').innerText = '—';
    document.getElementById('deck-info').innerText = 'No cards active — open ☰ to enable groups';
    document.getElementById('star-btn').style.display = 'none';
    return;
  }
  const g = GROUPS.find(g => g.id === d.group);
  document.getElementById('affix-ko').innerText = d.root;
  document.getElementById('examples-ko').innerHTML = d.examples.map(e => {
    const s = SENT[e];
    return s ? `<div>${boldWord(s[0], e)}</div>` : `<div>${e}</div>`;
  }).join('');
  document.getElementById('affix-en').innerText = d.gloss;
  document.getElementById('affix-ko-back').innerText = d.root;
  document.getElementById('examples-en').innerHTML = d.breakdown.map(b => renderBreakdownTiles(b)).join('');
  document.getElementById('grp-badge').innerText = g ? g.name : '';
  if (peekCard) {
    document.getElementById('prog-front').innerText = 'Preview · disabled group';
    document.getElementById('prog-back').innerText = 'Preview · disabled group';
    document.getElementById('deck-info').innerText = 'Previewing a card from a disabled group · Next returns to your deck';
  } else {
    const lbl = `Card ${pointer + 1}`;
    document.getElementById('prog-front').innerText = lbl;
    document.getElementById('prog-back').innerText = lbl;
    document.getElementById('deck-info').innerText = `${deck.length} card${deck.length !== 1 ? 's' : ''} active · tap to flip`;
  }
  document.getElementById('info-btn').style.display = currentCardHasNote() ? 'flex' : 'none';
  updateStarBtn();
}

function initDeck() {
  peekCard = null;
  const deck = getActiveDeck();
  if (deck.length === 0) { renderCard(); return; }
  const start = Math.floor(Math.random() * deck.length);
  history = [start];
  pointer = 0;
  cardIdx = start;
  renderCard();
}

function flipCard() {
  if (noteOpen) { closeNote(); return; }
  isFlipped = !isFlipped;
  $card.classList.toggle('flipped', isFlipped);
}
function resetFlip() {
  if (noteOpen) closeNote();
  isFlipped = false;
  $card.classList.remove('flipped');
}

function nextCard(e) {
  if (e) e.stopPropagation();
  const was = isFlipped;
  resetFlip();
  const deck = getActiveDeck();
  if (!deck.length) { peekCard = null; renderCard(); return; }
  const wasPeek = !!peekCard;
  peekCard = null;
  setTimeout(() => {
    if (wasPeek) {
      // leaving a preview: advance to a fresh active-group card
      const ni = randIdx(deck, history[pointer]);
      history.push(ni);
      pointer++;
    } else if (pointer < history.length - 1) {
      pointer++;
    } else {
      const ni = randIdx(deck, history[pointer]);
      history.push(ni);
      pointer++;
    }
    cardIdx = history[pointer];
    renderCard();
  }, was ? 250 : 0);
}

function prevCard(e) {
  if (e) e.stopPropagation();
  const wasPeek = !!peekCard;
  if (!wasPeek && pointer <= 0) return;
  const was = isFlipped;
  resetFlip();
  peekCard = null;
  setTimeout(() => {
    if (!wasPeek) pointer--;
    cardIdx = history[pointer];
    renderCard();
  }, was ? 250 : 0);
}

// Swipe
let ty0 = 0;
let swipeFromScroll = false;
$card.addEventListener('touchstart', e => {
  ty0 = e.changedTouches[0].screenY;
  // If the touch began inside the scrollable breakdown, treat it as scrolling, not a swipe.
  swipeFromScroll = !!(e.target.closest && e.target.closest('#examples-en'));
}, { passive:true });
$card.addEventListener('touchend',   e => {
  if (noteOpen || swipeFromScroll) return;
  const d = ty0 - e.changedTouches[0].screenY;
  if (d > 60) nextCard();
  else if (d < -60) prevCard();
}, { passive:true });

// ── AMBIGUITY NOTES ─────────────────────────────────────────────────────
let noteOpen = false;

function sylOf(card) { return card.root.split(' ')[0]; }

function currentCardHasNote() {
  const d = currentCard();
  return d ? !!NOTES[sylOf(d)] : false;
}

function renderEntry(syl, hanja, gloss, ex) {
  const root = hanja ? `${syl} (${hanja})` : '';
  const card = root ? CARDS.find(c => c.root === root) : null;
  const head = hanja ? `${syl} (${hanja})` : syl;
  let cls = 'note-entry', onclick = '';
  if (card && activeGroups.has(card.group)) {
    cls += ' tappable';
    onclick = ` onclick="jumpToCardRoot(event,${jsArg(root)});closeNote()"`;
  } else if (card) {
    cls += ' peekable';
    onclick = ` onclick="peekCardRoot(event,${jsArg(root)});closeNote()"`;
  }
  return `<div class="${cls}"${onclick}>`
       + `<span class="ne-head">${head}</span> `
       + `<span class="ne-gloss">${gloss}</span>`
       + `<div class="ne-ex">${ex}</div>`
       + `</div>`;
}

function buildNoteBody(card) {
  const syl = sylOf(card);
  const data = NOTES[syl];
  let html = '';
  if (data.sino) {
    html += '<div class="note-section"><div class="note-label sino">Sino-Korean</div>';
    html += data.sino.map(([h,g,e]) => renderEntry(syl,h,g,e)).join('');
    html += '</div>';
  }
  if (data.native) {
    html += '<div class="note-section"><div class="note-label nat">Native Korean</div>';
    html += data.native.map(([h,g,e]) => renderEntry(syl,h,g,e)).join('');
    html += '</div>';
  }
  return html;
}

function openNote(e) {
  if (e) e.stopPropagation();
  const card = currentCard();
  if (!card) return;
  document.getElementById('note-title').innerText = sylOf(card) + ' — homophones';
  document.getElementById('note-body').innerHTML = buildNoteBody(card);
  document.getElementById('note-overlay').classList.add('show');
  noteOpen = true;
}

function closeNote(e) {
  if (e) e.stopPropagation();
  document.getElementById('note-overlay').classList.remove('show');
  noteOpen = false;
}

function jumpFromNote(di) {
  closeNote();
  // di is an active-deck position (homophone chips are built from active deck)
  jumpToActivePos(di);
}

// Jump into rotation: target is in an active group.
function jumpToActivePos(deckPos) {
  resetFlip();
  peekCard = null;
  history.push(deckPos);
  pointer = history.length - 1;
  cardIdx = deckPos;
  renderCard();
}

// Tap a green tile (active group) — jump by card root, enters rotation.
function jumpToCardRoot(e, rootStr) {
  if (e) e.stopPropagation();
  const deck = getActiveDeck();
  const pos = deck.findIndex(c => c.root === rootStr);
  if (pos < 0) { peekCardRoot(null, rootStr); return; }  // safety: group got disabled
  jumpToActivePos(pos);
}

// Tap a yellow tile (disabled group) — show that card ONCE without entering rotation.
function peekCardRoot(e, rootStr) {
  if (e) e.stopPropagation();
  const card = CARDS.find(c => c.root === rootStr);
  if (!card) return;
  resetFlip();
  peekCard = card;
  renderCard();
}

// ── VIEW SWITCHING ────────────────────────────────────────────────────────
function showCards() {
  document.getElementById('view-cards').classList.add('active');
  document.getElementById('view-table').classList.remove('active');
  document.getElementById('table-btn').style.display = '';
}

function showTable() {
  document.getElementById('view-table').classList.add('active');
  document.getElementById('view-cards').classList.remove('active');
  document.getElementById('table-btn').style.display = 'none';
  renderTable();
}

// ── TABLE VIEW ────────────────────────────────────────────────────────────
function renderTable() {
  const q    = document.getElementById('tbl-input').value.toLowerCase().trim();
  const deck = getActiveDeck();
  const el   = document.getElementById('tbl-scroll');

  const byGroup = {};
  deck.forEach(card => {
    if (q) {
      const hit = card.root.toLowerCase().includes(q)
               || card.gloss.toLowerCase().includes(q)
               || card.examples.some(x => x.toLowerCase().includes(q))
               || card.breakdown.some(x => x.replace(/<[^>]+>/g,'').toLowerCase().includes(q));
      if (!hit) return;
    }
    (byGroup[card.group] = byGroup[card.group] || []).push(card);
  });

  const gids = Object.keys(byGroup).map(Number).sort((a,b) => a-b);
  if (!gids.length) {
    el.innerHTML = `<div class="empty-msg">${deck.length === 0
      ? 'No groups active.<br>Open ☰ to enable groups.'
      : 'No results for that filter.'}</div>`;
    return;
  }

  el.innerHTML = gids.map(gid => {
    const gName = GROUPS.find(g => g.id === gid)?.name || '';
    const rows  = byGroup[gid].map(card => {
      const di = deck.indexOf(card);
      const [rootHangul, hanjaRaw] = [card.root.split(' ')[0], card.root.match(/\(([^)]+)\)/)?.[1] || ''];
      return `<div class="tbl-row" onclick="jumpToCard(${di})">
        <div class="tbl-root">${rootHangul}</div>
        <div class="tbl-hanja">${hanjaRaw}</div>
        <div class="tbl-gloss">${card.gloss}</div>
        <div class="tbl-arrow">›</div>
      </div>`;
    }).join('');
    return `<div class="grp-hdr">Group ${gid} · ${gName}</div>${rows}`;
  }).join('');
}

function jumpToCard(di) {
  showCards();
  jumpToActivePos(di);
}

// ── MENU ──────────────────────────────────────────────────────────────────
function renderMenu() {
  const starCount = starred.size;
  const starChecked = activeGroups.has(STAR_GROUP) ? 'checked' : '';
  const starRow = `<div class="grp-item star-row">
      <div class="grp-item-label">
        <div class="grp-item-name">★ Starred</div>
        <div class="grp-item-count">${starCount} card${starCount !== 1 ? 's' : ''}</div>
      </div>
      <label class="tog">
        <input type="checkbox" ${starChecked} onchange="toggleGroup(${STAR_GROUP},this.checked)">
        <div class="tog-track"></div>
        <div class="tog-thumb"></div>
      </label>
    </div>`;
  const groupRows = GROUPS.map(g => {
    const count   = CARDS.filter(c => c.group === g.id).length;
    const checked = activeGroups.has(g.id) ? 'checked' : '';
    return `<div class="grp-item">
      <div class="grp-item-label">
        <div class="grp-item-name">Group ${g.id}: ${g.name}</div>
        <div class="grp-item-count">${count} roots</div>
      </div>
      <label class="tog">
        <input type="checkbox" ${checked} onchange="toggleGroup(${g.id},this.checked)">
        <div class="tog-track"></div>
        <div class="tog-thumb"></div>
      </label>
    </div>`;
  }).join('');
  document.getElementById('grp-list').innerHTML = starRow + groupRows;
}

function toggleGroup(id, on) {
  on ? activeGroups.add(id) : activeGroups.delete(id);
}

function setAll(on) {
  // preserve Starred toggle state; All On/Off acts on the 7 real groups
  const starOn = activeGroups.has(STAR_GROUP);
  activeGroups = on ? new Set(GROUPS.map(g => g.id)) : new Set();
  if (starOn) activeGroups.add(STAR_GROUP);
  renderMenu();
}

function openMenu() {
  renderMenu();
  document.getElementById('overlay').classList.add('open');
}

function closeMenu() {
  document.getElementById('overlay').classList.remove('open');
  initDeck();
  // refresh table if visible
  if (document.getElementById('view-table').classList.contains('active')) renderTable();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeMenu();
}

// ── BOOT ──────────────────────────────────────────────────────────────────
initDeck();
</script>
</body>
